<!DOCTYPE html>
<html>
<head>
    <title>Island Builder</title>

    <style>
        @keyframes clickBounce {
            0% { transform: scale(1); }
            50% { transform: scale(0.85); }
            100% { transform: scale(1); }
        }

        .clicked {
            animation: clickBounce 0.15s ease;
        }

        body {
            margin: 0;
            font-family: Arial;
            color: white;
            background: linear-gradient(
                to bottom,
                #87ceeb 0%,
                #87ceeb 60%,
                #3cb371 60%,
                #2e8b57 100%
            );
        }

        #game {
            text-align: center;
            padding-top: 80px;
        }

        #topBar {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 2000;
        }

        #shop {
            position: fixed;
            right: -220px;
            top: 0;
            width: 200px;
            height: 100vh;
            background: #f5e0b7;
            color: black;
            padding: 15px;
            transition: right 0.3s ease;
        }

        #shop.open {
            right: 0;
        }

        button {
            cursor: pointer;
        }

        #tree {
            width: 220px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #tree:hover {
            transform: scale(1.05);
        }

        .floating {
            position: absolute;
            color: white;
            font-size: 20px;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>

<body>

<div id="topBar">
    <button onclick="toggleShop()">☰ Shop</button>
    <button onclick="saveGame()">Save</button>
</div>

<div id="game">

    <img id="tree" src="assets/tree.png" onclick="clickTree()">

    <p id="woodText">Wood: 0</p>
</div>

<div id="shop">
    <h2>Shop</h2>

    <button onclick="buyLumberjack()">Hire Lumberjack 🪓</button>
    <p id="lumberjackInfo"></p>

    <button onclick="buyWorker()">Hire Worker 👷</button>
    <p id="workerInfo"></p>
</div>

<script>

/* STATE */

let stone = 0;
let stonePerSecond = 0;

let wood = 0;
let woodPerSecond = 0;

let miner = {
    cost: 25,
    owned: 0,
    cps: 1
};

let lumberjack = { cost: 10, owned: 0, cps: 1 };
let worker = { cost: 100, owned: 0, cps: 5 };

let playTime = 0;

/* CLICK */

function clickRock() {
    stone++;
    updateScreen();

}
function clickTree() {
    wood++;

    let tree = document.getElementById("tree");
    tree.classList.remove("clicked");
    void tree.offsetWidth;
    tree.classList.add("clicked");

    let floatText = document.createElement("div");
    floatText.innerText = "+1";
    floatText.classList.add("floating");

    document.getElementById("game").appendChild(floatText);

    setTimeout(() => floatText.remove(), 800);

    updateScreen();
}

/* SHOP */

function buyMiner() {
    if(wood >= miner.cost) {
        wood -= miner.cost;
        miner.owned++;
        stonePerSecond += miner.cps;
        miner.cost = Math.floor(miner.cost * 1.2);
        updateScreen();
        
    }
}
function buyLumberjack() {
    if (wood >= lumberjack.cost) {
        wood -= lumberjack.cost;
        lumberjack.owned++;
        woodPerSecond += lumberjack.cps;
        lumberjack.cost = Math.floor(lumberjack.cost * 1.2);
        updateScreen();
    }
}

function buyWorker() {
    if (wood >= worker.cost) {
        wood -= worker.cost;
        worker.owned++;
        woodPerSecond += worker.cps;
        worker.cost = Math.floor(worker.cost * 1.2);
        updateScreen();
    }
}

/* UI */
function updateScreen() {
    document.getElementById("woodText").innerText = "Wood: " + wood;

    document.getElementById("lumberjackInfo").innerText =
        `Owned: ${lumberjack.owned} | Cost: ${lumberjack.cost} | +${lumberjack.cps}/sec`;

    document.getElementById("workerInfo").innerText =
        `Owned: ${worker.owned} | Cost: ${worker.cost} | +${worker.cps}/sec`;
}

/* LOOP */
setInterval(() => {
    wood += woodPerSecond;
    stone +=  stonePerSecond;
    updateScreen();
}, 1000);

setInterval(() => playTime++, 1000);

/* SAVE */
function saveGame() {
    localStorage.setItem("wood", wood);
    localStorage.setItem("woodPerSecond", woodPerSecond);
    localStorage.setItem("lumberjack", JSON.stringify(lumberjack));
    localStorage.setItem("worker", JSON.stringify(worker));
    localStorage.setItem("playTime", playTime);
}

/* LOAD */
function loadGame() {
    wood = Number(localStorage.getItem("wood")) || 0;
    woodPerSecond = Number(localStorage.getItem("woodPerSecond")) || 0;

    lumberjack = JSON.parse(localStorage.getItem("lumberjack")) || lumberjack;
    worker = JSON.parse(localStorage.getItem("worker")) || worker;

    playTime = Number(localStorage.getItem("playTime")) || 0;
}

/* SHOP TOGGLE */
function toggleShop() {
    document.getElementById("shop").classList.toggle("open");
}

/* START */
loadGame();
updateScreen();

</script>

</body>
</html>
