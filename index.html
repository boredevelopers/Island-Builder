<!DOCTYPE html>
<html>

<head>

<title>Island Builder</title>


<style>


body{

margin:0;
font-family:Arial;
color:white;
overflow:hidden;

}



/* =========================
WORLD
========================= */


#game{


width:100vw;
height:100vh;

position:relative;


background:

linear-gradient(

to bottom,

#87ceeb 0%,
#87ceeb 55%,
#3cb371 55%,
#2e8b57 100%

);


}



/* =========================
TOP BAR
========================= */


#topBar{


position:fixed;

top:10px;
right:10px;

z-index:1000;


}



button{


padding:8px;

cursor:pointer;


}



/* =========================
OBJECTS
========================= */


.object{


position:absolute;

image-rendering:pixelated;

cursor:pointer;

transition:.15s;


}



.object:hover{

transform:scale(1.1);

}



#tree{


width:280px;

left:35%;

top:45%;


}




#teleporter{


width:130px;

left:50%;

top:70%;


display:none;


}





/* =========================
QUARRY
========================= */


#quarry{


display:none;


width:100vw;

height:100vh;


background:


linear-gradient(

to bottom,

#777,

#222

);


position:absolute;



}



#quarryMiner{


position:absolute;

width:220px;

left:45%;

top:45%;


cursor:pointer;


}



/* =========================
SHOP
========================= */


#shop{


display:none;


position:fixed;

right:0;

top:0;

width:240px;

height:100vh;


background:#f5e0b7;

color:black;

padding:15px;


}



/* =========================
TEXT
========================= */


#stats{


position:absolute;

top:20px;

left:20px;


background:rgba(0,0,0,.4);

padding:10px;


}



.floating{


position:absolute;

animation:float 1s forwards;


}



@keyframes float{


from{

opacity:1;
transform:translateY(0);

}


to{

opacity:0;
transform:translateY(-60px);


}


}



</style>


</head>



<body>



<div id="topBar">


<button onclick="saveGame()">

Save

</button>


</div>






<div id="game">


<img id="tree"

class="object"

src="assets/tree.png"

onclick="gatherWood()">


<img id="teleporter"

class="object"

src="assets/teleporter.png"

onclick="enterQuarry()">



<div id="stats"></div>


</div>





<div id="quarry">


<img id="quarryMiner"

src="assets/miner.png"

onclick="mineStone()">



<div id="quarryStats"></div>


</div>






<div id="shop">


<h2>Shop</h2>


<p>

Future upgrades here

</p>


</div>





<script>



/* =========================
STATE
========================= */


let wood=0;

let stone=0;


let tpUnlocked=false;


let shopUnlocked=false;


let currentArea="Island";





/* =========================
WOOD
========================= */


function gatherWood(){


wood++;


popup("+1 Wood");


checkUnlock();


update();


}






/* =========================
TELEPORTER
========================= */


function checkUnlock(){


if(

wood>=250

&&

!tpUnlocked

){


tpUnlocked=true;


shopUnlocked=true;



document.getElementById("teleporter")

.style.display="block";



document.getElementById("shop")

.style.display="block";



popup("Teleporter Unlocked!");



}


}





function enterQuarry(){


document.getElementById("game")

.style.display="none";



document.getElementById("quarry")

.style.display="block";


currentArea="Quarry";


update();



}





/* =========================
STONE
========================= */


function mineStone(){


stone++;


popup("+1 Stone");


update();


}





/* =========================
POPUP
========================= */


function popup(text){


let p=document.createElement("div");


p.innerText=text;


p.className="floating";


p.style.left="50%";

p.style.top="50%";


document.body.appendChild(p);



setTimeout(()=>{


p.remove();


},1000);



}







/* =========================
UI
========================= */


function update(){


if(currentArea==="Island"){


document.getElementById("stats")

.innerHTML=

`

Area: Island 🌴

<br>

Wood: ${wood}

<br>

Stone: ${stone}

<br><br>

${!tpUnlocked?

"Need 250 Wood for Teleporter"

:

"Teleporter unlocked!"

}


`;



}



else{


document.getElementById("quarryStats")

.innerHTML=

`

Area: Quarry 🪨

<br>

Wood: ${wood}

<br>

Stone: ${stone}

`;



}




}







/* =========================
SAVE
========================= */


function saveGame(){


localStorage.setItem("wood",wood);

localStorage.setItem("stone",stone);

localStorage.setItem("tp",tpUnlocked);


alert("Saved!");

}



function loadGame(){


wood=

Number(localStorage.getItem("wood"))

||0;



stone=

Number(localStorage.getItem("stone"))

||0;



tpUnlocked=

localStorage.getItem("tp")

==="true";



if(tpUnlocked){


document.getElementById("teleporter")

.style.display="block";


document.getElementById("shop")

.style.display="block";


}


}



loadGame();

update();



</script>


</body>

</html>
