<!DOCTYPE html>
<html>
<head>
    <title>Island Builder</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            background: linear-gradient(
                to bottom,
                #87ceeb 0%,
                #87ceeb 55%,
                #3cb371 55%,
                #2e8b57 100%
            );
            height: 100vh;
        }

        #game {
            text-align: center;
            padding-top: 80px;
        }

        #topBar {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 2000;
        }

        #shop {
            position: fixed;
            right: -260px;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #f5e0b7;
            color: black;
            padding: 15px;
            transition: right 0.3s ease;
            box-shadow: -2px 0 5px rgba(0,0,0,0.3);
        }

        #shop.open {
            right: 0;
        }

        button {
            cursor: pointer;
            margin-top: 6px;
            padding: 5px 10px;
        }

        #tree, #rock {
            width: 180px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.1s ease;
        }

        #tree:hover, #rock:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div id="topBar">
    <button onclick="toggleShop()">☰ Shop</button>
    <button onclick="saveGame()">Save</button>
</div>

<div id="game">
    <img id="tree" src="assets/tree.png" alt="Tree" onclick="clickTree()">
    <img id="rock" src="assets/rock.png" alt="Rock" onclick="clickRock()">

    <p id="woodText">Wood: 0</p>
    <p id="stoneText">Stone: 0</p>

    <p id="stats">Time: 0s</p>
</div>

<div id="shop">
    <h2>Shop</h2>

    <h3>Wood Upgrades</h3>
    <button onclick="buyLumberjack()">Lumberjack 🪓</button>
    <p id="lumberjackInfo"></p>

    <button onclick="buyWorker()">Worker 👷</button>
    <p id="workerInfo"></p>

    <h3>Stone Upgrades</h3>
    <button onclick="buyMiner()">Miner ⛏️</button>
    <p id="minerInfo"></p>
</div>

<script>

/* STATE */
let wood = 0;
let stone = 0;

let woodPerSecond = 0;
let stonePerSecond = 0;

let lumberjack = { cost: 10, owned: 0, cps: 1 };
let worker = { cost: 50, owned: 0, cps: 3 };
let miner = { cost: 25, owned: 0, cps: 1 }; // Costs wood, produces stone

let playTime = 0;

/* CLICK */
function clickTree() {
    wood++;
    updateScreen();
}

function clickRock() {
    stone++;
    updateScreen();
}

/* BUY */
function buyLumberjack() {
    if (wood >= lumberjack.cost) {
        wood -= lumberjack.cost;
        lumberjack.owned++;
        woodPerSecond += lumberjack.cps;
        lumberjack.cost = Math.floor(lumberjack.cost * 1.2);
        updateScreen();
    }
}

function buyWorker() {
    if (wood >= worker.cost) {
        wood -= worker.cost;
        worker.owned++;
        woodPerSecond += worker.cps;
        worker.cost = Math.floor(worker.cost * 1.2);
        updateScreen();
    }
}

function buyMiner() {
    // Kept your setting where purchasing a Miner costs wood, but generates stone
    if (wood >= miner.cost) {
        wood -= miner.cost;
        miner.owned++;
        stonePerSecond += miner.cps;
        miner.cost = Math.floor(miner.cost * 1.2);
        updateScreen();
    }
}

/* UI */
function updateScreen() {
    document.getElementById("woodText").innerText = "Wood: " + wood;
    document.getElementById("stoneText").innerText = "Stone: " + stone;

    document.getElementById("lumberjackInfo").innerText =
        `Owned: ${lumberjack.owned} | Cost: ${lumberjack.cost} Wood | +${lumberjack.cps}/sec`;

    document.getElementById("workerInfo").innerText =
        `Owned: ${worker.owned} | Cost: ${worker.cost} Wood | +${worker.cps}/sec`;

    document.getElementById("minerInfo").innerText =
        `Owned: ${miner.owned} | Cost: ${miner.cost} Wood | +${miner.cps}/sec`;

    document.getElementById("stats").innerText = `Time: ${playTime}s`;
}

/* CORE LOOP */
setInterval(() => {
    wood += woodPerSecond;
    stone += stonePerSecond;
    playTime++;
    updateScreen();
}, 1000);

/* SHOP PANEL TOGGLE */
function toggleShop() {
    document.getElementById("shop").classList.toggle("open");
}

/* SAVE */
function saveGame() {
    localStorage.setItem("wood", wood);
    localStorage.setItem("stone", stone);
    localStorage.setItem("woodPerSecond", woodPerSecond);
    localStorage.setItem("stonePerSecond", stonePerSecond);
    localStorage.setItem("lumberjack", JSON.stringify(lumberjack));
    localStorage.setItem("worker", JSON.stringify(worker));
    localStorage.setItem("miner", JSON.stringify(miner));
    localStorage.setItem("playTime", playTime);
    alert("Game saved successfully!");
}

/* LOAD */
function loadGame() {
    // Check if a save actually exists before trying to load data
    if (localStorage.getItem("wood") !== null) {
        wood = Number(localStorage.getItem("wood")) || 0;
        stone = Number(localStorage.getItem("stone")) || 0;
        
        woodPerSecond = Number(localStorage.getItem("woodPerSecond")) || 0;
        stonePerSecond = Number(localStorage.getItem("stonePerSecond")) || 0;

        lumberjack = JSON.parse(localStorage.getItem("lumberjack")) || lumberjack;
        worker = JSON.parse(localStorage.getItem("worker")) || worker;
        miner = JSON.parse(localStorage.getItem("miner")) || miner;

        playTime = Number(localStorage.getItem("playTime")) || 0;
    }
}
    
/* START */
loadGame();
updateScreen();

</script>

</body>
</html>
